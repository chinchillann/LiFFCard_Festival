<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午歲時・身心防禦編譯器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f141c; color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; 
            /* 防止手機畫面上滑下拉的橡皮筋效果影響遊戲 */
            overflow: hidden; 
            touch-action: none;
        }
        .game-container {
            position: relative; display: flex; gap: 20px; background: #1a2333; padding: 20px;
            border-radius: 16px; border: 1px solid #2e3d52; max-width: 95vw; box-sizing: border-box;
        }
        canvas { 
            background: #090d16; border-radius: 8px; border: 2px solid #10b981; 
            max-width: 100%; height: auto; display: block;
        }
        .dashboard { width: 220px; display: flex; flex-direction: column; justify-content: space-between; }
        h2 { margin: 0 0 10px 0; color: #10b981; font-size: 18px; letter-spacing: 1px; }
        .desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
        .stat-box { background: #0d131f; border: 1px solid #2e3d52; padding: 12px; border-radius: 8px; margin-bottom: 10px; flex: 1; }
        .stat-label { font-size: 11px; color: #64748b; }
        .stat-value { font-size: 24px; font-weight: bold; color: #10b981; margin-top: 4px; font-family: monospace; }
        .legend { font-size: 12px; margin-top: 15px; border-top: 1px dashed #2e3d52; padding-top: 15px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; color: #94a3b8; white-space: nowrap; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
        
        /* 按鈕與遮罩控制 */
        .btn-action { background: #10b981; color: #090d16; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 14px; width: 100%; }
        .btn-action:hover { background: #34d399; }
        
        /* 轉場動畫外層遮罩 */
        #transition-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.95); border-radius: 16px;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 10;
        }
        .terminal-box {
            width: 95%; font-family: monospace; font-size: 13px; line-height: 1.8;
            color: #34d399; text-align: left; white-space: pre-wrap;
        }
        .typing-line {
            opacity: 0; overflow: hidden; border-right: 2px solid transparent;
            margin-bottom: 8px;
        }
        @keyframes fadeIn { to { opacity: 1 } }

        /* 📱 RWD 行動裝置主場優化 (螢幕寬度小於 650px) */
        @media (max-width: 650px) {
            body { justify-content: flex-start; padding: 10px 0; overflow-y: auto; }
            .game-container {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                width: 95vw;
                max-width: 400px; /* 控制在單手好操作的寬度 */
            }
            canvas {
                width: 100%;
                height: auto; /* 等比例縮放高度 */
            }
            .dashboard {
                width: 100%;
                flex-direction: column;
                gap: 10px;
            }
            .desc { margin-bottom: 10px; font-size: 12px; }
            /* 讓兩個數據方塊在手機上橫向並排，節省空間 */
            .stats-wrapper {
                display: flex;
                gap: 10px;
            }
            .stat-box { margin-bottom: 0; padding: 8px 12px; }
            .stat-value { font-size: 20px; }
            .legend { 
                margin-top: 5px; padding-top: 10px;
                display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            }
            .legend-item { margin-bottom: 4px; }
            .btn-action { padding: 12px; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="transition-overlay">
            <div class="terminal-box" id="terminal-content"></div>
        </div>

        <canvas id="pachinko" width="380" height="520"></canvas>
        <div class="dashboard">
            <div>
                <h2>🌿 歲時身心防禦編譯</h2>
                <div class="desc">移動底部的中央容器，在 15 秒內收集落下的節氣食材與祝福微粒，制作專屬的端午御守。</div>
                
                <div class="stats-wrapper">
                    <div class="stat-box">
                        <div class="stat-label">倒數計時 (Timer)</div>
                        <div class="stat-value" id="timer-val" style="color: #f59e0b;">15s</div>
                    </div>
                    
                    <div class="stat-box">
                        <div class="stat-label">已封裝食材 (Ingredients)</div>
                        <div class="stat-value" id="score-val">0</div>
                    </div>
                </div>

                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background:#e2e8f0;"></div><span>🍚 糯米（穩健底氣）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#10b981;"></div><span>🌿 粽葉（防禦阻尼）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#f59e0b;"></div><span>🥚 蛋黃（核心功能）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#f43f5e;"></div><span>❌ 五毒（環境雜音）</span></div>
                </div>
            </div>
            <button class="btn-action" id="start-btn">⚡ 開始制作開運粽</button>
        </div>
    </div>

    <script>
        // 初始化 LINE LIFF 
        const MY_LIFF_ID = '2009826317-bfxoaTmF'; 
        
        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (error) {
                console.error("LIFF 初始化失敗", error);
            }
        }
        initLIFF();

        window.onload = function() {
            const canvas = document.getElementById('pachinko');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score-val');
            const timerEl = document.getElementById('timer-val');
            const startBtn = document.getElementById('start-btn');
            const overlay = document.getElementById('transition-overlay');
            const terminal = document.getElementById('terminal-content');

            let gameState = 'READY'; 
            let gameTime = 15;
            let timerInterval;
            let totalItemsCaught = 0;
            
            // 收集比例統計
            let stats = { rice: 0, leaf: 0, yolk: 0, bug: 0 };
            let items = [];

            const basket = {
                x: canvas.width / 2 - 45,
                y: canvas.height - 40,
                width: 90,
                height: 12,
                color: '#10b981'
            };

            const ITEM_TYPES = [
                { name: 'rice', color: '#e2e8f0', radius: 4, speed: 2.2, weight: 0.5 },
                { name: 'leaf', color: '#10b981', radius: 6, speed: 2.6, weight: 0.25 },
                { name: 'yolk', color: '#f59e0b', radius: 7, speed: 3.0, weight: 0.15 },
                { name: 'bug', color: '#f43f5e', radius: 5, speed: 3.4, weight: 0.10 }
            ];

            // 取得觸控或滑鼠相對於 Canvas 實際渲染比例的 X 座標
            function getCanvasX(clientX) {
                const rect = canvas.getBoundingClientRect();
                // 考量到 CSS 可能對 Canvas 進行了縮放 (例如手機上 width 變小了)
                return (clientX - rect.left) * (canvas.width / rect.width);
            }

            // 滑鼠控制
            canvas.addEventListener('mousemove', (e) => {
                if (gameState !== 'PLAYING') return;
                basket.x = getCanvasX(e.clientX) - basket.width / 2;
                keepBasketInBounds();
            });

            // 觸控控制
            canvas.addEventListener('touchmove', (e) => {
                if (gameState !== 'PLAYING') return;
                basket.x = getCanvasX(e.touches[0].clientX) - basket.width / 2;
                keepBasketInBounds();
                e.preventDefault();
            }, { passive: false });

            function keepBasketInBounds() {
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
            }

            function spawnItem() {
                if (gameState !== 'PLAYING') return;
                let rand = Math.random();
                let selected = ITEM_TYPES[0];
                let sum = 0;
                for (let type of ITEM_TYPES) {
                    sum += type.weight;
                    if (rand <= sum) { selected = type; break; }
                }
                items.push({
                    x: Math.random() * (canvas.width - 30) + 15,
                    y: 0,
                    ...selected
                });
            }

            function startTimer() {
                timerInterval = setInterval(() => {
                    gameTime--;
                    timerEl.textContent = gameTime + "s";
                    if (gameTime <= 0) {
                        clearInterval(timerInterval);
                        triggerTransition();
                    }
                }, 1000);
            }

            // 轉場
            function triggerTransition() {
                gameState = 'FINISHED';
                canvas.style.filter = 'blur(6px)';
                overlay.style.display = 'flex';

                const lines = [
                    "[System_Cat] 🐾 倒數結束。主廚喵喵在鍵盤旁伸了個懶腰。",
                    "[System_Cat] 🐾 正在封裝剛才收集的節氣食材與祝福微粒...",
                    "[System_Cat] 🐾 慢火蒸煮中，空氣裡多了一點竹葉的清香。",
                    "====================================",
                    "[SUCCESS]: 專屬「端午喵喵歲時御守」編譯完成，即將為您傳送。"
                ];

                let currentLine = 0;
                function printLog() {
                    if (currentLine < lines.length) {
                        const div = document.createElement('div');
                        div.className = 'typing-line';
                        div.textContent = lines[currentLine];
                        div.style.animation = 'fadeIn 0.4s forwards';
                        terminal.appendChild(div);
                        currentLine++;
                        setTimeout(printLog, 700); 
                    } else {
                        setTimeout(sendFlexMessage, 1200); 
                    }
                }
                printLog();
            }

            function sendFlexMessage() {
                let resultTitle = "適時離線，啟動個人的專屬防火牆";
                let resultDesc = "外面的世界很忙、雜音很多。學學喵喵，適時掛上請勿打擾，給自己一個安靜的空間隔絕喧囂。好好睡一覺，身心值得被溫柔防護。願您步調自在。";

                if (stats.yolk >= stats.leaf && stats.yolk >= stats.rice) {
                    resultTitle = "衝刺的同時，記得保持系統回穩";
                    resultDesc = "最近的生活過得充實且極度努力。但盛夏初到，過度衝刺容易心火浮躁。下半年追求目標時，別忘了隨時停下來喝口水、伸個懶腰。適時留白，生活才能走得更長遠。";
                } else if (stats.rice >= stats.leaf && stats.rice >= stats.yolk) {
                    resultTitle = "專注當下，現在的節奏就很好";
                    resultDesc = "糯米健脾胃，是所有經典風味的起點。默默把基礎打好，踏實過好每一天。根基穩固，外邪不入，專注生活本身就是最迷人的防禦美學。";
                }

                const flexData = {
                    type: "bubble",
                    body: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#0f141c",
                        paddingAll: "20px",
                        contents: [
                            { type: "text", text: "🫔 端午歲時・身心御守", weight: "bold", color: "#10b981", size: "sm", letterSpacing: "1px" },
                            { type: "text", text: resultTitle, weight: "bold", size: "lg", margin: "md", color: "#e2e8f0", wrap: true },
                            { type: "separator", margin: "lg", color: "#2e3d52" },
                            {
                                type: "box", layout: "vertical", margin: "lg", spacing: "sm",
                                contents: [
                                    {
                                        type: "box", layout: "horizontal",
                                        contents: [
                                            { type: "text", text: "基礎紮實度", size: "xs", color: "#64748b" },
                                            { type: "text", text: `${stats.rice * 10}%`, size: "xs", color: "#34d399", align: "end" }
                                        ]
                                    },
                                    {
                                        type: "box", layout: "horizontal",
                                        contents: [
                                            { type: "text", text: "環境抗噪力", size: "xs", color: "#64748b" },
                                            { type: "text", text: `${stats.leaf * 10}%`, size: "xs", color: "#34d399", align: "end" }
                                        ]
                                    }
                                ]
                            },
                            { type: "separator", margin: "lg", color: "#2e3d52" },
                            { type: "text", text: resultDesc, margin: "lg", size: "sm", color: "#94a3b8", wrap: true, lineSpacing: "1.6" },
                            { type: "text", text: "🐾 System_Cat 靜靜陪伴 ｜ 端午安康", margin: "xxl", size: "xs", color: "#64748b", fontStyle: "italic" }
                        ]
                    }
                };

                if (liff.isApiAvailable('shareTargetPicker')) {
                    liff.shareTargetPicker([{
                        type: "flex",
                        altText: "收到了來自端午歲時的身心防禦御守",
                        contents: flexData
                    }]).then(() => {
                        liff.closeWindow(); 
                    }).catch((err) => {
                        console.error("傳送失敗或使用者取消", err);
                        liff.closeWindow();
                    });
                } else {
                    alert("請在 LINE 環境中執行以發送賀卡");
                }
            }

            function gameLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = basket.color;
                ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

                if (gameState === 'PLAYING') {
                    if (Math.random() < 0.09) spawnItem();

                    for (let i = items.length - 1; i >= 0; i--) {
                        let item = items[i];
                        item.y += item.speed;

                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                        ctx.fillStyle = item.color;
                        ctx.fill();
                        ctx.closePath();

                        if (item.y >= basket.y && item.y <= basket.y + basket.height &&
                            item.x >= basket.x && item.x <= basket.x + basket.width) {
                            
                            stats[item.name]++;
                            if (item.name !== 'bug') {
                                totalItemsCaught++;
                                scoreEl.textContent = totalItemsCaught;
                            }
                            items.splice(i, 1);
                            continue;
                        }

                        if (item.y > canvas.height) { items.splice(i, 1); }
                    }
                }

                if (gameState === 'READY') {
                    ctx.fillStyle = '#64748b';
                    ctx.font = '13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡ 準備就緒，點擊按鈕開始 ⚡', canvas.width / 2, canvas.height / 2);
                }

                requestAnimationFrame(gameLoop);
            }

            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    if (gameState !== 'READY') return;
                    gameState = 'PLAYING';
                    startBtn.style.opacity = '0.4';
                    startBtn.style.pointerEvents = 'none';
                    startTimer();
                });
            }

            gameLoop();
        };
    </script>
</body>
</html>
