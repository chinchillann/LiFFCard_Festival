<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午歲時・身心御守粽</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f141c; color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; 
            overflow: hidden; 
            touch-action: none;
        }
        .game-container {
            position: relative; display: flex; gap: 20px; background: #1a2333; padding: 20px;
            border-radius: 16px; border: 1px solid #2e3d52; max-width: 95vw; box-sizing: border-box;
        }
        canvas { 
            background: #090d16; border-radius: 8px; border: 2px solid #10b981; 
            max-width: 100%; height: auto; display: block;
        }
        .dashboard { width: 220px; display: flex; flex-direction: column; justify-content: space-between; }
        h2 { margin: 0 0 10px 0; color: #10b981; font-size: 18px; letter-spacing: 1px; }
        .desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
        .stat-box { background: #0d131f; border: 1px solid #2e3d52; padding: 12px; border-radius: 8px; margin-bottom: 10px; flex: 1; }
        .stat-label { font-size: 11px; color: #64748b; }
        .stat-value { font-size: 24px; font-weight: bold; color: #10b981; margin-top: 4px; font-family: monospace; }
        .legend { font-size: 12px; margin-top: 15px; border-top: 1px dashed #2e3d52; padding-top: 15px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; color: #94a3b8; white-space: nowrap; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
        
        /* 手機端專用頂部操作提示欄（預設在電腦版不顯示） */
        .mobile-instruction { display: none; }

        /* 按鈕與遮罩控制 */
        .btn-action { background: #10b981; color: #090d16; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 14px; width: 100%; }
        .btn-action:hover { background: #34d399; }
        
        /* 轉場動畫外層遮罩 */
        #transition-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.95); border-radius: 16px;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 10;
        }
        .terminal-box {
            width: 95%; font-family: monospace; font-size: 13px; line-height: 1.8;
            color: #34d399; text-align: left; white-space: pre-wrap;
        }
        .typing-line {
            opacity: 0; overflow: hidden; border-right: 2px solid transparent;
            margin-bottom: 8px;
        }
        @keyframes fadeIn { to { opacity: 1 } }

        /* 📱 手機端 RWD 佈局優化 */
        @media (max-width: 650px) {
            body { justify-content: center; padding: 5px; }
            .game-container {
                flex-direction: column;
                padding: 10px;
                gap: 6px;
                width: 95vw;
                max-width: 390px;
                max-height: 98vh;
            }
            .dashboard { width: 100%; }
            h2 { font-size: 15px; margin: 0; text-align: center; }
            .desc { display: none; } /* 隱藏原本側邊長文案 */
            
            /* 啟用手機端、精簡不吃高度的頂部教學區 */
            .mobile-instruction {
                display: block;
                text-align: center;
                font-size: 12px;
                color: #a3e635; /* 顯眼的萊姆綠提示 */
                background: #0d131f;
                padding: 6px;
                border-radius: 6px;
                border: 1px dashed #2e3d52;
                margin-bottom: 2px;
                line-height: 1.4;
            }

            .stats-wrapper { display: flex; gap: 8px; margin-top: 4px; }
            .stat-box { padding: 6px 10px; }
            .stat-value { font-size: 18px; }
            .legend { 
                margin-top: 6px; padding-top: 6px;
                display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            }
            .legend-item { margin-bottom: 0; font-size: 11px; }
            .btn-action { padding: 12px; margin-top: 6px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="transition-overlay">
            <div class="terminal-box" id="terminal-content"></div>
        </div>

        <div class="mobile-instruction">
            ☝️ <b>左右滑動手指</b> 操控下方主廚喵喵<br>⏰ 在 <b>15 秒內</b> 收集落下的食材與微粒製作御守！
        </div>

        <canvas id="pachinko" width="380" height="420"></canvas>
        
        <div class="dashboard">
            <div>
                <h2>🌿 歲時身心防禦編譯</h2>
                <div class="desc">移動底部的中央容器，在 15 秒內收集落下的節氣食材與祝福微粒，製作專屬的端午御守。</div>
                
                <div class="stats-wrapper">
                    <div class="stat-box">
                        <div class="stat-label">倒數計時</div>
                        <div class="stat-value" id="timer-val" style="color: #f59e0b;">15s</div>
                    </div>
                    
                    <div class="stat-box">
                        <div class="stat-label">已封裝食材</div>
                        <div class="stat-value" id="score-val">0</div>
                    </div>
                </div>

                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background:#e2e8f0;"></div><span>🍚 糯米（穩健底氣）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#10b981;"></div><span>🌿 粽葉（防禦阻尼）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#f59e0b;"></div><span>🥚 蛋黃（核心功能）</span></div>
                    <div class="legend-item"><div class="dot" style="background:#f43f5e;"></div><span>❌ 五毒（環境雜音）</span></div>
                </div>
            </div>
            <button class="btn-action" id="start-btn">⚡ 開始制作開運粽</button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2009826317-bfxoaTmF'; 
        
        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
            } catch (error) { console.error("LIFF 初始化失敗", error); }
        }
        initLIFF();

        window.onload = function() {
            const canvas = document.getElementById('pachinko');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score-val');
            const timerEl = document.getElementById('timer-val');
            const startBtn = document.getElementById('start-btn');
            const overlay = document.getElementById('transition-overlay');
            const terminal = document.getElementById('terminal-content');

            let gameState = 'READY'; 
            let gameTime = 15;
            let timerInterval;
            let totalItemsCaught = 0;
            
            let stats = { rice: 0, leaf: 0, yolk: 0, bug: 0 };
            let items = [];

            const basket = {
                x: canvas.width / 2 - 45,
                y: canvas.height - 45, 
                width: 90,
                height: 15 
            };

            const ITEM_TYPES = [
                { name: 'rice', color: '#e2e8f0', radius: 4, speed: 2.5, weight: 0.5 },
                { name: 'leaf', color: '#10b981', radius: 6, speed: 2.8, weight: 0.25 },
                { name: 'yolk', color: '#f59e0b', radius: 7, speed: 3.2, weight: 0.15 },
                { name: 'bug', color: '#f43f5e', radius: 5, speed: 3.5, weight: 0.10 }
            ];

            function getCanvasX(clientX) {
                const rect = canvas.getBoundingClientRect();
                return (clientX - rect.left) * (canvas.width / rect.width);
            }

            canvas.addEventListener('mousemove', (e) => {
                if (gameState !== 'PLAYING') return;
                basket.x = getCanvasX(e.clientX) - basket.width / 2;
                keepBasketInBounds();
            });

            canvas.addEventListener('touchmove', (e) => {
                if (gameState !== 'PLAYING') return;
                basket.x = getCanvasX(e.touches[0].clientX) - basket.width / 2;
                keepBasketInBounds();
                e.preventDefault();
            }, { passive: false });

            function keepBasketInBounds() {
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
            }

            function spawnItem() {
                if (gameState !== 'PLAYING') return;
                let rand = Math.random();
                let selected = ITEM_TYPES[0];
                let sum = 0;
                for (let type of ITEM_TYPES) {
                    sum += type.weight;
                    if (rand <= sum) { selected = type; break; }
                }
                items.push({
                    x: Math.random() * (canvas.width - 30) + 15,
                    y: 0,
                    ...selected
                });
            }

            function startTimer() {
                timerInterval = setInterval(() => {
                    gameTime--;
                    timerEl.textContent = gameTime + "s";
                    if (gameTime <= 0) {
                        clearInterval(timerInterval);
                        triggerTransition();
                    }
                }, 1000);
            }

            function triggerTransition() {
                gameState = 'FINISHED';
                canvas.style.filter = 'blur(6px)';
                overlay.style.display = 'flex';

                const lines = [
                    "[chinchillann] 🐾 倒數結束。主廚喵喵在鍵盤旁伸了個懶腰。",
                    "[chinchillann] 🐾 正在封裝剛才收集的節氣食材與祝福微粒...",
                    "[chinchillann] 🐾 慢火蒸煮中，空氣裡多了一點竹葉的清香。",
                    "====================================",
                    "[SUCCESS]: 專屬個人的「端午歲時御守」制作完成，即將為您傳送。"
                ];

                let currentLine = 0;
                function printLog() {
                    if (currentLine < lines.length) {
                        const div = document.createElement('div');
                        div.className = 'typing-line';
                        div.textContent = lines[currentLine];
                        div.style.animation = 'fadeIn 0.4s forwards';
                        div.style.animation = 'fadeIn 0.4s forwards';
                        terminal.appendChild(div);
                        currentLine++;
                        setTimeout(printLog, 600); 
                    } else {
                        setTimeout(sendFlexMessage, 1000); 
                    }
                }
                printLog();
            }

            function sendFlexMessage() {
                let resultTitle = "";
                let resultDesc = "";

                // 🌟 6種結果判斷邏輯
                if (stats.bug >= 5) {
                    resultTitle = "淨化環境雜音，重啟核心安全防火牆";
                    resultDesc = "收集到了較多的五毒微粒。這代表外面的世界最近有點太吵，干擾了您的步調。提醒您：適時清理環境雜訊，刪掉不必要的社交與負面訊息，把能量留給自己，重新找回清爽的內部防禦線。";
                } else if (totalItemsCaught < 5) {
                    resultTitle = "隨緣慢活，享受個人的極簡留白";
                    resultDesc = "生活不一定要隨時塞滿各類指標。選擇用最舒適、不慌不忙的節奏走完這 15 秒。以一種不隨波逐流的淡定&從容的步調，自在的姿態笑看人間盛夏風雲。";
                } else if (stats.rice > 0 && stats.leaf > 0 && stats.yolk > 0 && totalItemsCaught >= 25) {
                    resultTitle = "五行調和，全系統防禦指標最大化";
                    resultDesc = "太厲害了！糯米、粽葉與蛋黃全部完美封裝，無一缺漏。這意味著此刻的身心狀態正面臨完美的平衡與升級。根基穩固、抗噪點滿、核心飽滿，已經準備好迎接未來的任何挑戰，萬事皆安康！";
                } else if (stats.yolk >= stats.leaf && stats.yolk >= stats.rice) {
                    resultTitle = "衝刺追求核心，但也別忘讓系統回穩";
                    resultDesc = "最近的生活過得充實且極度努力，像金黃的蛋黃一樣全力發光。但盛夏初到，過度衝刺容易讓心火有些浮躁。下半年追求目標時，別忘了適時停下來喝口水、伸個懶腰。適時留白更長遠。";
                } else if (stats.rice >= stats.leaf && stats.rice >= stats.yolk) {
                    resultTitle = "專注當下，踏實平穩就是最高美學";
                    resultDesc = "糯米健脾胃，是一切經典風味的起點。默默把最基礎的底氣打好，踏實過好每一天。當根基足夠穩固，外在的邪氣雜音自然無法入侵。專注於當下的生活本身，就是最迷人的防禦狀態。";
                } else {
                    resultTitle = "適時防禦離線，啟動個人的請勿打擾";
                    resultDesc = "外面的世界很忙、變動很快，暫時選擇用層層翠綠的粽葉將自己溫源包裹。學學喵喵，適時對外界掛上「請勿打擾」，給自己一個安靜的空間隔絕所有喧囂。好好吃頓飯、睡個覺，每個人都值得被溫柔防護。";
                }

                const displayRice = String(stats.rice);
                const displayLeaf = String(stats.leaf);
                const liffUrl = `https://liff.line.me/${MY_LIFF_ID}`;

                // 🚀 重新設計的 Flex Message JSON 結構 (完美結合龍舟喵喵圖片與原本的資訊)
                const flexData = {
                    type: "bubble",
                    body: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#0f141c",
                        paddingAll: "0px", // 改成 0px 讓圖片能左右滿版
                        contents: [
                            {
                                type: "box",
                                layout: "vertical",
                                paddingAll: "20px",
                                paddingBottom: "0px",
                                contents: [
                                    { type: "text", text: "🍃 端午歲時・身心御守", weight: "bold", color: "#10b981", size: "sm" },
                                    { type: "text", text: resultTitle, weight: "bold", size: "md", margin: "md", color: "#e2e8f0", wrap: true }
                                ]
                            },
                            {
                                type: "image",
                                url: "https://chinchillann.github.io/LiFFCard_Festival/dragonBoat2.jpg",
                                size: "full",
                                aspectMode: "cover",
                                aspectRatio: "1.5:1", // 配合圖片比例優化
                                margin: "md"
                            },
                            {
                                type: "box",
                                layout: "vertical",
                                paddingAll: "20px",
                                paddingTop: "15px",
                                contents: [
                                    {
                                        type: "box", layout: "vertical", spacing: "sm",
                                        contents: [
                                            {
                                                type: "box", layout: "horizontal",
                                                contents: [
                                                    { type: "text", text: "基礎封裝量 (Rice)", size: "xs", color: "#64748b" },
                                                    { type: "text", text: displayRice + " units", size: "xs", color: "#34d399", align: "end" }
                                                ]
                                            },
                                            {
                                                type: "box", layout: "horizontal",
                                                contents: [
                                                    { type: "text", text: "環境抗噪值 (Leaf)", size: "xs", color: "#64748b" },
                                                    { type: "text", text: displayLeaf + " layers", size: "xs", color: "#34d399", align: "end" }
                                                ]
                                            }
                                        ]
                                    },
                                    { type: "separator", margin: "lg", color: "#2e3d52" },
                                    { type: "text", text: resultDesc, margin: "lg", size: "sm", color: "#94a3b8", wrap: true },
                                    { type: "text", text: "🐾 Happy Dragon Boat Festival 🐾", margin: "xxl", size: "xs", color: "#64748b" }
                                ]
                            }
                        ]
                    },
                    footer: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#0f141c",
                        paddingAll: "15px",
                        paddingTop: "0px", 
                        contents: [
                            {
                                type: "button",
                                action: {
                                    type: "uri",
                                    label: "⚡ 點這裡製作御守粽",
                                    uri: liffUrl
                                },
                                style: "primary",
                                color: "#10b981", 
                                height: "sm"
                            }
                        ]
                    }
                };

                if (liff.isApiAvailable('shareTargetPicker')) {
                    liff.shareTargetPicker([{
                        type: "flex",
                        altText: "收到了來自端午歲時的身心防禦御守",
                        contents: flexData
                    }]).then(() => {
                        liff.closeWindow(); 
                    }).catch((err) => {
                        console.error("傳送失敗或取消", err);
                        liff.closeWindow();
                    });
                } else {
                    alert("請在 LINE App 內開啟此網頁方能分享賀卡。");
                }
            }

            // 動態手繪：舒安高舉貓碗
            function drawCatChef(bx, by, bw, bh) {
                let centerX = bx + bw / 2;

                // 1. 繪製貓頭
                ctx.fillStyle = '#cbd5e1'; 
                ctx.beginPath();
                ctx.arc(centerX, by + 32, 22, 0, Math.PI * 2);
                ctx.fill();

                // 2. 貓耳朵
                ctx.fillStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.moveTo(centerX - 18, by + 18);
                ctx.lineTo(centerX - 24, by + 2);
                ctx.lineTo(centerX - 8, by + 15);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX + 18, by + 18);
                ctx.lineTo(centerX + 24, by + 2);
                ctx.lineTo(centerX + 8, by + 15);
                ctx.fill();

                // 耳朵內襯
                ctx.fillStyle = '#fda4af';
                ctx.beginPath();
                ctx.moveTo(centerX - 16, by + 16);
                ctx.lineTo(centerX - 21, by + 5);
                ctx.lineTo(centerX - 9, by + 14);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX + 16, by + 16);
                ctx.lineTo(centerX + 21, by + 5);
                ctx.lineTo(centerX + 9, by + 14);
                ctx.fill();

                // 3. 眼睛
                ctx.fillStyle = '#0f141c';
                ctx.beginPath();
                ctx.arc(centerX - 8, by + 26, 3.5, 0, Math.PI * 2);
                ctx.arc(centerX + 8, by + 26, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(centerX - 9, by + 25, 1, 0, Math.PI * 2);
                ctx.arc(centerX + 7, by + 25, 1, 0, Math.PI * 2);
                ctx.fill();

                // 4. 鼻子
                ctx.fillStyle = '#f43f5e';
                ctx.beginPath();
                ctx.moveTo(centerX, by + 29);
                ctx.lineTo(centerX - 2, by + 27);
                ctx.lineTo(centerX + 2, by + 27);
                ctx.fill();

                // 5. 繪製橘色貓碗 
                ctx.fillStyle = '#f97316'; 
                ctx.beginPath();
                ctx.moveTo(bx + 10, by);
                ctx.lineTo(bx + bw - 10, by);
                ctx.lineTo(bx + bw - 18, by + bh);
                ctx.lineTo(bx + 18, by + bh);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ea580c';
                ctx.fillRect(bx + 8, by, bw - 16, 3);

                // 6. 貓爪
                ctx.fillStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.arc(bx + 12, by + bh - 2, 7, 0, Math.PI * 2);
                ctx.arc(bx + bw - 12, by + bh - 2, 7, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fda4af';
                ctx.beginPath();
                ctx.arc(bx + 12, by + bh - 2, 3, 0, Math.PI * 2);
                ctx.arc(bx + bw - 12, by + bh - 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            function gameLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                drawCatChef(basket.x, basket.y, basket.width, basket.height);

                if (gameState === 'PLAYING') {
                    if (Math.random() < 0.09) spawnItem();

                    for (let i = items.length - 1; i >= 0; i--) {
                        let item = items[i];
                        item.y += item.speed;

                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                        ctx.fillStyle = item.color;
                        ctx.fill();
                        ctx.closePath();

                        if (item.y >= basket.y && item.y <= basket.y + basket.height &&
                            item.x >= basket.x && item.x <= basket.x + basket.width) {
                            
                            stats[item.name]++;
                            if (item.name !== 'bug') {
                                totalItemsCaught++;
                                scoreEl.textContent = totalItemsCaught;
                            }
                            items.splice(i, 1);
                            continue;
                        }

                        if (item.y > canvas.height) { items.splice(i, 1); }
                    }
                }

                if (gameState === 'READY') {
                    ctx.fillStyle = '#64748b';
                    ctx.font = '13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡ 準備就緒，點擊下方按鈕開始 ⚡', canvas.width / 2, canvas.height / 3);
                }

                requestAnimationFrame(gameLoop);
            }

            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    if (gameState !== 'READY') return;
                    gameState = 'PLAYING';
                    startBtn.style.opacity = '0.4';
                    startBtn.style.pointerEvents = 'none';
                    startTimer();
                });
            }

            gameLoop();
        };
    </script>
</body>
</html>
